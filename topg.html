<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="/js/guard/obf/trc.js"></script>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.1/socket.io.min.js" crossorigin="anonymous"></script>

    <script src="sharedio/sharedio.js"></script>
    <script src="socketioclient.js?v=10"></script>

    <link rel="stylesheet" href="/css/text-effects.css">
    <script src="/js/text-effects.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            overflow-x: hidden;
            width: 100%;
        }

        .counterContainer {
            font-size: 1.9em;
        }

        .counterContainer>div {
            top: 0;
            position: absolute;
            width: 100%;
            text-align: center;
        }

        .image>img {
            display: none;
            width: 100%;
            height: auto;
            filter: blur(0.7px) saturate(110%) hue-rotate(5deg);
            height: 150px;
            width: 165px;
            animation: upDown 5s infinite;
        }

        .counterBump {
            animation: zoomBeat 0.1s ease-in-out forwards;
        }

        .counter {
            font-size: 0.85em;
        }

        .username {
            text-overflow: ellipsis;
            white-space: nowrap;
            overflow: hidden;
        }

        .username.text-effect--wavy,
        .username.text-effect--wavy-slow,
        .username.text-effect--wavy-fast {
            white-space: normal;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: nowrap;
            padding-top: 10px;
            padding-bottom: 10px;
            line-height: 1.4;
        }

        .title.text-effect--wavy,
        .title.text-effect--wavy-slow,
        .title.text-effect--wavy-fast {
            white-space: normal;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: nowrap;
            padding-top: 10px;
            padding-bottom: 10px;
            line-height: 1.4;
        }

        .username .wave-char,
        .title .wave-char {
            line-height: inherit;
        }

        @keyframes zoomBeat {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.3);
            }

            100% {
                transform: scale(1);
            }
        }

        @keyframes upDown {
            0% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(5px);
            }

            100% {
                transform: translateY(0);
            }
        }
    </style>

    <script>
        let dataReceived = false;

        function getSetting(name, defaultValue) {
            if (!settings || typeof settings['topg_' + name] === "undefined") {
                return defaultValue;
            }

            return settings['topg_' + name];
        }

        function updateSettings(hasChanges) {
            $('.title').css('color', getSetting('titleColor', '#9d6d6d'));
            $('.counter').css('color', getSetting('counterColor', '#ebc94d'));

            $('.title').css('margin-top', getSetting('titleYOffset', 0) + 'px');
            $('.username').css('margin-top', getSetting('usernameYOffset', 170) + 'px');
            $('.counter').css('margin-top', getSetting('counterYOffset', 170) + 'px');
            $('.image').css('margin-top', getSetting('giftYOffset', 40) + 'px');

            if (dataReceived) {
                $('.title').text(getSetting('titleText', ''));
            } else {
                $('.title').text("Please start TikFinity");
            }

            let usernameFontSize = (parseInt(getSetting('usernameSize', 50)) / 50) + 'em';
            $('.username').css('font-size', usernameFontSize);

            let titleFontSize = (parseInt(getSetting('titleSize', 50)) / 50) + 'em';
            $('.title').css('font-size', titleFontSize);

            if (getSetting('enableBorder')) {
                const borderShadow = `-1px -1px 0 ${getSetting('borderColor')}, 1px -1px 0 ${getSetting('borderColor')}, -1px 1px 0 ${getSetting('borderColor')}, 1px 1px 0 ${getSetting('borderColor')}`;

                if (getSetting('titleEffect', 'none') === 'none' && !getSetting('titleGlow', false)) {
                    $('.title').css("text-shadow", borderShadow);
                } else {
                    $('.title').css("text-shadow", 'inherit');
                }

                if (getSetting('usernameEffect', 'none') === 'none' && !getSetting('usernameGlow', false)) {
                    $('.username').css("text-shadow", borderShadow);
                } else {
                    $('.username').css("text-shadow", 'inherit');
                }

                $('.counter').css("text-shadow", borderShadow);
            } else {
                $('.title, .username, .counter').css("text-shadow", 'inherit');
            }

            if (getSetting('giftEnabled', true)) {
                $('.image img').css('opacity', getSetting('giftOpacity', 100) / 100);
            } else {
                $('.image img').css('opacity', 0);
            }

            if (getSetting('showGiftValue', true) === false) {
                $('.counter').css('display', 'none');
            } else {
                $('.counter').css('display', 'block');
            }

            if (window.TextEffects) {
                const $title = $('.title');
                TextEffects.applyComprehensiveEffects($title, {
                    effect: getSetting('titleEffect', 'none'),
                    wave: getSetting('titleWave', false),
                    waveSpeed: getSetting('titleWaveSpeed', 'normal'),
                    glow: getSetting('titleGlow', false),
                    glowColor: getSetting('titleGlowColor', '#ffffff'),
                    isRgbColor: false,
                    rgbColor: null,
                    defaultColor: getSetting('titleColor', '#c9c9c9')
                });
            }

            if (window.TextEffects) {
                const $username = $('.username');
                TextEffects.applyComprehensiveEffects($username, {
                    effect: getSetting('usernameEffect', 'none'),
                    wave: getSetting('usernameWave', false),
                    waveSpeed: getSetting('usernameWaveSpeed', 'normal'),
                    glow: getSetting('usernameGlow', false),
                    glowColor: getSetting('usernameGlowColor', '#ffffff'),
                    isRgbColor: false,
                    rgbColor: null,
                    defaultColor: getSetting('usernameColor', '#ebc94d')
                });
            }

            if (hasChanges) {
                setCount(lastCount);
            }
        }

        let lastCount = 0;

        function setCount(count) {
            lastCount = count;
            $(".widget .counterContainer .counter").text(count?.toLocaleString() + " " + getSetting('coinsAlias', 'Coins'));
        }

        function setTopStreakerData(data) {
            $(".widget .counterContainer .image img").attr("src", data.giftPictureUrl);
            $(".widget .counterContainer .username").text(data.username);
            $(".widget .counterContainer .title").text(data.title);

            setTimeout(() => {
                setCount(data.count);
            }, 50);

            if (data.count > 0) {
                $(".widget .counterContainer .counter").addClass("counterBump");
                setTimeout(() => {
                    $(".widget .counterContainer .counter").removeClass("counterBump");
                }, 120);
            }

            if (data.giftPictureUrl) {
                $(".widget .counterContainer .image img").show();
            } else {
                $(".widget .counterContainer .image img").hide();
            }
        }

        let lastTopGiftData = null;

        $(window).on("load", async () => {
            if (location.href.includes('cid=0') && location.href.includes('preview')) {
                dataReceived = true;
            }

            updateSettings();

            if (!lastTopGiftData) {
                if (location.href.includes('cid=0') && location.href.includes('preview')) {
                    dataReceived = true;
                    setTopStreakerData({
                        giftPictureUrl: "https://p16-webcast.tiktokcdn.com/img/maliva/webcast-va/resource/1d067d13988e8754ed6adbebd89b9ee8.png~tplv-obj.webp",
                        username: "Username",
                        count: 5000
                    });
                } else {
                    setTopStreakerData({
                        giftPictureUrl: "https://p16-webcast.tiktokcdn.com/img/maliva/webcast-va/resource/1d067d13988e8754ed6adbebd89b9ee8.png~tplv-obj.webp",
                        username: "Username",
                        count: 0
                    });
                }
            }
        });

        io.on("topGiftData", (data) => {
            if (location.href.includes('cid=0') && location.href.includes('preview')) return;

            if (!location.href.includes('preview') && settings.isPro === false) {
                document.write('');
                return;
            }

            dataReceived = true;
            updateSettings();

            if (data.topGift && JSON.stringify(data.topGift) !== JSON.stringify(lastTopGiftData)) {
                lastTopGiftData = data.topGift;
                setTopStreakerData(data.topGift);
            }

            updateSettings();
        });

    </script>
</head>

<body>
    <div class="widget">
        <div class="counterContainer">
            <div class="image">
                <img>
            </div>
            <div class="title">Please start TikFinity</div>
            <div class="username">-</div>
            <div class="counter">-</div>
        </div>
    </div>

</body>

</html>
