<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minecraft Achievement Stream Widget</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    :root {
      --frame: #6a737c;
      --frame-dark: #1a1c20;
      --panel-top: rgba(45, 49, 56, 0.94);
      --panel-bottom: rgba(16, 18, 22, 0.95);
      --title: #f2de63;
      --text: #f4f7ff;
      --glow: rgba(119, 197, 255, 0.22);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: transparent !important;
      overflow: hidden;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 12px;
      font-family: "Press Start 2P", monospace;
      pointer-events: none;
    }

    .toast {
      position: relative;
      width: min(920px, 100%);
      display: grid;
      grid-template-columns: 82px 1fr;
      gap: 14px;
      align-items: center;
      padding: 12px 16px 12px 12px;
      border: 2px solid var(--frame);
      border-radius: 12px;
      background: linear-gradient(180deg, var(--panel-top), var(--panel-bottom));
      box-shadow:
        inset 0 0 0 2px var(--frame-dark),
        0 10px 32px rgba(0, 0, 0, 0.42),
        0 0 22px var(--glow);
      animation: intro 1120ms cubic-bezier(.18, .82, .2, 1) both;
    }

    .toast::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 10px;
      background: linear-gradient(100deg, transparent 8%, rgba(255, 255, 255, 0.27) 45%, transparent 72%);
      transform: translateX(-135%);
      animation: shine 9.6s ease-in-out infinite;
      pointer-events: none;
    }

    .icon-shell {
      width: 82px;
      height: 82px;
      border: 2px solid #c8c1ac;
      border-radius: 8px;
      background: linear-gradient(180deg, #b46812, #99540c);
      box-shadow:
        inset 0 0 0 2px rgba(38, 22, 9, 0.62),
        0 5px 14px rgba(0, 0, 0, 0.45);
      display: grid;
      place-items: center;
      overflow: hidden;
      animation: bob 5.4s ease-in-out infinite;
    }

    .icon {
      width: 64px;
      height: 64px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .title {
      margin: 0;
      color: var(--title);
      font-size: clamp(15px, 2.1vw, 30px);
      line-height: 1.2;
      text-shadow: 0 2px 0 rgba(74, 66, 20, 0.95);
      letter-spacing: 0.4px;
    }

    .line {
      margin-top: 10px;
      color: var(--text);
      font-size: clamp(12px, 1.45vw, 23px);
      line-height: 1.35;
      text-shadow: 0 2px 0 rgba(0, 0, 0, 0.8);
      transition: opacity 520ms ease, transform 520ms ease, filter 520ms ease;
      will-change: opacity, transform, filter;
    }

    .line-row {
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .tg-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 8px;
      border-radius: 999px;
      border: 1px solid rgba(175, 222, 255, 0.5);
      background: rgba(60, 145, 215, 0.16);
      box-shadow: 0 0 4px rgba(69, 184, 255, 0.2);
      color: #d7ebff;
      font-size: clamp(9px, 0.95vw, 15px);
      line-height: 1.1;
      white-space: nowrap;
      text-shadow: 0 1px 0 rgba(0, 0, 0, 0.72);
      flex: 0 0 auto;
      opacity: 0.95;
    }

    .tg-tag svg {
      width: 12px;
      height: 12px;
      fill: #ffffff;
    }

    .line.is-hiding {
      opacity: 0;
      transform: translateY(6px);
      filter: blur(2px);
    }

    @keyframes intro {
      from {
        opacity: 0;
        transform: translateY(-18px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes shine {
      0%, 14% {
        transform: translateX(-135%);
      }
      35%, 100% {
        transform: translateX(140%);
      }
    }

    @keyframes bob {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-2px);
      }
    }

    @media (max-width: 600px) {
      .toast {
        grid-template-columns: 68px 1fr;
        gap: 11px;
        padding: 10px 12px 10px 10px;
      }

      .icon-shell {
        width: 68px;
        height: 68px;
      }

      .icon {
        width: 52px;
        height: 52px;
      }

      .line {
        margin-top: 0;
      }

      .line-row {
        margin-top: 8px;
      }
    }
  </style>
</head>
<body>
  <section class="toast" aria-label="Minecraft achievement widget">
    <div class="icon-shell" aria-hidden="true">
      <svg class="icon" viewBox="0 0 16 16" shape-rendering="crispEdges" xmlns="http://www.w3.org/2000/svg">
        <rect width="16" height="16" fill="#8f4a0c"/>
        <rect x="1" y="1" width="14" height="14" fill="#c97a1f"/>
        <rect x="2" y="3" width="12" height="4" fill="#f6f5ef"/>
        <rect x="2" y="7" width="12" height="6" fill="#e4a74f"/>
        <rect x="3" y="8" width="10" height="4" fill="#c57b2e"/>
        <rect x="4" y="4" width="1" height="1" fill="#db4b5d"/>
        <rect x="7" y="4" width="1" height="1" fill="#db4b5d"/>
        <rect x="10" y="4" width="1" height="1" fill="#db4b5d"/>
        <rect x="13" y="2" width="1" height="12" fill="#f2c684"/>
        <rect x="2" y="13" width="11" height="1" fill="#8f5318"/>
      </svg>
    </div>

    <div>
      <h1 class="title">Достижение получено!</h1>
      <div class="line-row">
        <p class="line" id="rotatingText" aria-live="polite">35 лет :D • Уже зашел? Мега хорош!</p>
        <span class="tg-tag" id="tgTag" aria-label="Telegram">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M21.5 3.8c-.2-.2-.5-.3-.8-.2l-17.9 6.9c-.4.2-.7.6-.7 1s.2.8.6 1l4.5 1.8 1.8 5c.2.4.5.7 1 .7h.1c.4 0 .8-.3 1-.7l2.4-3 3.9 3c.4.3.9.3 1.3.1.4-.2.6-.6.7-1L22 4.7c0-.4-.1-.7-.5-.9Z"></path>
          </svg>
          <span id="tgName">@yapponecc1</span>
        </span>
      </div>
    </div>
  </section>

  <script>
    const tg = "@yapponecc1";
    const lines = [
      "35 лет :D • Уже зашел? Мега хорош!",
      "Сервер уже в Telegram: " + tg
    ];

    const minDelay = 4000;
    const maxDelay = 6000;
    const fadeMs = 520;

    const textEl = document.getElementById("rotatingText");
    const tgName = document.getElementById("tgName");
    let idx = 0;

    tgName.textContent = tg;

    function randomDelay() {
      return Math.floor(Math.random() * (maxDelay - minDelay + 1)) + minDelay;
    }

    function rotateText() {
      textEl.classList.add("is-hiding");

      setTimeout(() => {
        idx = (idx + 1) % lines.length;
        textEl.textContent = lines[idx];
        textEl.classList.remove("is-hiding");
        setTimeout(rotateText, randomDelay());
      }, fadeMs);
    }

    setTimeout(rotateText, 4600);
  </script>
</body>
</html>
