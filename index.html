<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Telegram Achievement Widget</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    :root {
      --frame: #6d7680;
      --frame-dark: #171a1f;
      --title: #f4df63;
      --text: #f3f7ff;
      --tg-blue: #66c4ff;
      --panel-top: rgba(45, 50, 58, 0.94);
      --panel-bot: rgba(14, 17, 22, 0.96);
      --glow: rgba(95, 177, 255, 0.22);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: transparent !important;
      overflow: hidden;
    }

    body {
      font-family: "Press Start 2P", monospace;
      display: grid;
      place-items: start center;
      padding: 10px;
      pointer-events: none;
    }

    .widget {
      width: min(860px, 100%);
      border: 2px solid var(--frame);
      border-radius: 10px;
      padding: 12px;
      background:
        linear-gradient(180deg, var(--panel-top), var(--panel-bot)),
        repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.02) 0 1px, transparent 1px 5px),
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.018) 0 1px, transparent 1px 5px);
      box-shadow:
        inset 0 0 0 2px var(--frame-dark),
        0 12px 30px rgba(0, 0, 0, 0.42),
        0 0 20px var(--glow);
      outline: 1px solid rgba(194, 220, 245, 0.2);
      outline-offset: -4px;
      position: relative;
      overflow: hidden;
      animation: intro 1200ms cubic-bezier(.19, .82, .21, 1) both;
    }

    .widget::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 10px;
      background: linear-gradient(105deg, transparent 12%, rgba(255, 255, 255, 0.2) 46%, transparent 72%);
      transform: translateX(-135%);
      animation: shine 11s ease-in-out infinite;
      pointer-events: none;
    }

    .row {
      display: grid;
      grid-template-columns: 84px minmax(0, 1fr);
      gap: 14px;
      align-items: center;
      position: relative;
      z-index: 2;
    }

    .icon-shell {
      width: 84px;
      height: 84px;
      border: 2px solid #c9c2ad;
      border-radius: 8px;
      background: linear-gradient(180deg, #b66a14, #97530e);
      box-shadow: inset 0 0 0 2px rgba(37, 23, 10, 0.63), 0 6px 14px rgba(0, 0, 0, 0.45);
      display: grid;
      place-items: center;
      overflow: hidden;
      animation: bob 5.8s ease-in-out infinite;
    }

    .icon {
      width: 64px;
      height: 64px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .title-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
    }

    .title {
      margin: 0;
      color: var(--title);
      font-size: clamp(13px, 1.85vw, 22px);
      line-height: 1.24;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-shadow: 0 2px 0 rgba(74, 65, 20, 0.95);
      letter-spacing: 0.2px;
    }

    .tg-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      max-width: 260px;
      padding: 5px 8px;
      border-radius: 999px;
      border: 1px solid rgba(169, 221, 255, 0.7);
      background: rgba(44, 133, 202, 0.28);
      box-shadow: 0 0 8px rgba(70, 184, 255, 0.3);
      color: #ebf7ff;
      font-size: clamp(7px, 0.7vw, 10px);
      text-shadow: 0 1px 0 rgba(0, 0, 0, 0.72);
      white-space: nowrap;
      overflow: hidden;
    }

    .tg-chip svg {
      width: 10px;
      height: 10px;
      fill: #ffffff;
      flex: 0 0 auto;
    }

    .tg-name {
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .divider {
      margin: 8px 0 0;
      height: 1px;
      border: 0;
      background: linear-gradient(90deg, transparent, rgba(152, 194, 232, 0.66), transparent);
      opacity: 0.9;
    }

    .line {
      margin: 10px 0 0;
      color: var(--text);
      font-size: clamp(9px, 1vw, 14px);
      line-height: 1.45;
      min-height: 2.7em;
      display: grid;
      align-content: center;
      text-shadow: 0 2px 0 rgba(0, 0, 0, 0.8);
      letter-spacing: 0.12px;
      transition: opacity 900ms ease, transform 900ms ease, filter 900ms ease;
    }

    .line.is-hiding {
      opacity: 0;
      transform: translateY(7px);
      filter: blur(2px);
    }

    @keyframes intro {
      from { opacity: 0; transform: translateY(-16px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes shine {
      0%, 12% { transform: translateX(-135%); }
      36%, 100% { transform: translateX(140%); }
    }

    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-2px); }
    }

    @media (max-width: 760px) {
      .row {
        grid-template-columns: 60px minmax(0, 1fr);
        gap: 10px;
      }

      .icon-shell {
        width: 60px;
        height: 60px;
      }

      .icon {
        width: 44px;
        height: 44px;
      }

      .title {
        font-size: clamp(10px, 3.9vw, 14px);
      }

      .line {
        font-size: clamp(8px, 3.1vw, 10px);
        min-height: 2.4em;
      }
    }
  </style>
</head>
<body>
  <section class="widget" aria-label="Telegram achievement widget">
    <div class="row">
      <div class="icon-shell" aria-hidden="true">
        <svg class="icon" viewBox="0 0 16 16" shape-rendering="crispEdges" xmlns="http://www.w3.org/2000/svg">
          <rect width="16" height="16" fill="#8f4a0c"/>
          <rect x="1" y="1" width="14" height="14" fill="#c97a1f"/>
          <rect x="2" y="3" width="12" height="4" fill="#f6f5ef"/>
          <rect x="2" y="7" width="12" height="6" fill="#e4a74f"/>
          <rect x="3" y="8" width="10" height="4" fill="#c57b2e"/>
          <rect x="4" y="4" width="1" height="1" fill="#db4b5d"/>
          <rect x="7" y="4" width="1" height="1" fill="#db4b5d"/>
          <rect x="10" y="4" width="1" height="1" fill="#db4b5d"/>
          <rect x="13" y="2" width="1" height="12" fill="#f2c684"/>
          <rect x="2" y="13" width="11" height="1" fill="#8f5318"/>
        </svg>
      </div>

      <div>
        <div class="title-row">
          <h1 class="title">Достижение получено!</h1>
          <span class="tg-chip" aria-label="Telegram">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M21.5 3.8c-.2-.2-.5-.3-.8-.2l-17.9 6.9c-.4.2-.7.6-.7 1s.2.8.6 1l4.5 1.8 1.8 5c.2.4.5.7 1 .7h.1c.4 0 .8-.3 1-.7l2.4-3 3.9 3c.4.3.9.3 1.3.1.4-.2.6-.6.7-1L22 4.7c0-.4-.1-.7-.5-.9Z"/>
            </svg>
            <span id="tgName" class="tg-name">@yapponecc1</span>
          </span>
        </div>

        <hr class="divider">
        <p class="line" id="rotatingText" aria-live="polite">Залетай в Telegram: yapponecc1</p>
      </div>
    </div>
  </section>

  <script>
    const tg = "yapponecc1";
    const lines = [
      "Залетай в Telegram: yapponecc1",
      "Уже зашел? Мега хорош!",
      "Ник в TG: yapponecc1"
    ];

    const minDelay = 8000;
    const maxDelay = 10000;
    const fadeMs = 900;

    const textEl = document.getElementById("rotatingText");
    const tgEl = document.getElementById("tgName");
    tgEl.textContent = "@" + tg;

    let idx = 0;

    function randomDelay() {
      return Math.floor(Math.random() * (maxDelay - minDelay + 1)) + minDelay;
    }

    function rotateText() {
      textEl.classList.add("is-hiding");

      setTimeout(() => {
        idx = (idx + 1) % lines.length;
        textEl.textContent = lines[idx];
        textEl.classList.remove("is-hiding");
        setTimeout(rotateText, randomDelay());
      }, fadeMs);
    }

    setTimeout(rotateText, 6000);
  </script>
</body>
</html>
