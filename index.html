<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minecraft Achievement Stream Widget</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    :root {
      --frame: #6a737c;
      --frame-dark: #1a1c20;
      --panel-top: rgba(45, 49, 56, 0.94);
      --panel-bottom: rgba(16, 18, 22, 0.95);
      --title: #f2de63;
      --text: #f4f7ff;
      --glow: rgba(119, 197, 255, 0.22);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: transparent !important;
      overflow: hidden;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 12px;
      font-family: "Press Start 2P", monospace;
      pointer-events: none;
    }

    .toast {
      position: relative;
      width: min(920px, 100%);
      display: grid;
      grid-template-columns: 82px 1fr;
      gap: 14px;
      align-items: center;
      padding: 12px 16px 12px 12px;
      border: 2px solid var(--frame);
      border-radius: 12px;
      background: linear-gradient(180deg, var(--panel-top), var(--panel-bottom));
      box-shadow:
        inset 0 0 0 2px var(--frame-dark),
        0 10px 32px rgba(0, 0, 0, 0.42),
        0 0 22px var(--glow);
      outline: 1px solid rgba(203, 224, 245, 0.2);
      outline-offset: -4px;
      animation: intro 1120ms cubic-bezier(.18, .82, .2, 1) both;
    }

    .toast::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 10px;
      background: linear-gradient(100deg, transparent 8%, rgba(255, 255, 255, 0.27) 45%, transparent 72%);
      transform: translateX(-135%);
      animation: shine 9.6s ease-in-out infinite;
      pointer-events: none;
    }

    .icon-shell {
      width: 82px;
      height: 82px;
      border: 2px solid #c8c1ac;
      border-radius: 8px;
      background: linear-gradient(180deg, #b46812, #99540c);
      box-shadow:
        inset 0 0 0 2px rgba(38, 22, 9, 0.62),
        0 5px 14px rgba(0, 0, 0, 0.45);
      display: grid;
      place-items: center;
      overflow: hidden;
      animation: bob 5.4s ease-in-out infinite;
    }

    .icon {
      width: 64px;
      height: 64px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .title {
      margin: 0;
      color: var(--title);
      font-size: clamp(13px, 1.8vw, 22px);
      line-height: 1.24;
      text-shadow: 0 2px 0 rgba(74, 66, 20, 0.95);
      letter-spacing: 0.25px;
    }

    .tops-row {
      margin-top: 8px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
      align-items: center;
      gap: 7px;
    }

    .top-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 7px;
      border-radius: 999px;
      border: 1px solid rgba(185, 214, 242, 0.34);
      background: rgba(16, 28, 44, 0.64);
      color: #dcecff;
      font-size: clamp(7px, 0.74vw, 10px);
      line-height: 1.2;
      white-space: nowrap;
      text-shadow: 0 1px 0 rgba(0, 0, 0, 0.7);
      max-width: 100%;
      min-width: 0;
      overflow: hidden;
    }

    .top-chip-label {
      color: #7bc8ff;
      flex: 0 0 auto;
    }

    .top-chip-value {
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }

    #topStreak {
      justify-self: start;
    }

    #topGift {
      justify-self: end;
    }

    .line {
      margin-top: 0;
      color: var(--text);
      font-size: clamp(10px, 1.18vw, 16px);
      line-height: 1.5;
      text-shadow: 0 2px 0 rgba(0, 0, 0, 0.8);
      transition: opacity 520ms ease, transform 520ms ease, filter 520ms ease;
      will-change: opacity, transform, filter;
      font-family: "Press Start 2P", monospace;
      letter-spacing: 0.15px;
    }

    .line-row {
      margin-top: 10px;
      display: block;
    }

    .tg-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 7px;
      border-radius: 999px;
      border: 1px solid rgba(175, 222, 255, 0.5);
      background: rgba(60, 145, 215, 0.16);
      box-shadow: 0 0 4px rgba(69, 184, 255, 0.2);
      color: #d7ebff;
      font-size: clamp(7px, 0.72vw, 10px);
      line-height: 1.25;
      white-space: nowrap;
      text-shadow: 0 1px 0 rgba(0, 0, 0, 0.72);
      flex: 0 0 auto;
      opacity: 0.95;
      justify-self: center;
      font-family: "Press Start 2P", monospace;
      max-width: 45%;
      overflow: hidden;
    }

    .tg-tag svg {
      width: 10px;
      height: 10px;
      fill: #ffffff;
      flex: 0 0 auto;
    }

    .tg-name {
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .line.is-hiding {
      opacity: 0;
      transform: translateY(6px);
      filter: blur(2px);
    }

    @keyframes intro {
      from {
        opacity: 0;
        transform: translateY(-18px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes shine {
      0%, 14% {
        transform: translateX(-135%);
      }
      35%, 100% {
        transform: translateX(140%);
      }
    }

    @keyframes bob {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-2px);
      }
    }

    @media (max-width: 600px) {
      .toast {
        grid-template-columns: 68px 1fr;
        gap: 11px;
        padding: 10px 12px 10px 10px;
      }

      .icon-shell {
        width: 68px;
        height: 68px;
      }

      .icon {
        width: 52px;
        height: 52px;
      }

      .line {
        font-size: clamp(9px, 2.4vw, 12px);
        line-height: 1.45;
      }

      .line-row {
        margin-top: 8px;
      }

      .top-chip {
        font-size: 7px;
      }

      .tg-tag {
        font-size: 7px;
      }
    }

    @media (max-width: 520px) {
      .tops-row {
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        grid-template-areas:
          "streak gift"
          "tg tg";
        row-gap: 6px;
      }

      #topStreak {
        grid-area: streak;
      }

      #topGift {
        grid-area: gift;
      }

      #tgTag {
        grid-area: tg;
        justify-self: center;
        max-width: 72%;
      }
    }

    @media (max-width: 420px) {
      body {
        padding: 6px;
      }

      .toast {
        grid-template-columns: 50px 1fr;
        gap: 8px;
        padding: 8px 9px 8px 8px;
      }

      .icon-shell {
        width: 50px;
        height: 50px;
      }

      .icon {
        width: 36px;
        height: 36px;
      }

      .title {
        font-size: clamp(10px, 4.1vw, 12px);
      }

      .line {
        font-size: clamp(8px, 3.2vw, 10px);
        line-height: 1.45;
      }

      .tg-tag {
        font-size: 8px;
        padding: 4px 5px;
      }

      .top-chip {
        font-size: 6px;
        padding: 3px 5px;
      }
    }
  </style>
</head>
<body>
  <section class="toast" aria-label="Minecraft achievement widget">
    <div class="icon-shell" aria-hidden="true">
      <svg class="icon" viewBox="0 0 16 16" shape-rendering="crispEdges" xmlns="http://www.w3.org/2000/svg">
        <rect width="16" height="16" fill="#8f4a0c"/>
        <rect x="1" y="1" width="14" height="14" fill="#c97a1f"/>
        <rect x="2" y="3" width="12" height="4" fill="#f6f5ef"/>
        <rect x="2" y="7" width="12" height="6" fill="#e4a74f"/>
        <rect x="3" y="8" width="10" height="4" fill="#c57b2e"/>
        <rect x="4" y="4" width="1" height="1" fill="#db4b5d"/>
        <rect x="7" y="4" width="1" height="1" fill="#db4b5d"/>
        <rect x="10" y="4" width="1" height="1" fill="#db4b5d"/>
        <rect x="13" y="2" width="1" height="12" fill="#f2c684"/>
        <rect x="2" y="13" width="11" height="1" fill="#8f5318"/>
      </svg>
    </div>

    <div>
      <h1 class="title">Достижение получено!</h1>
      <div class="tops-row">
        <span class="top-chip" id="topStreak"><span class="top-chip-label">STREAK</span><span class="top-chip-value">—</span></span>
        <span class="tg-tag" id="tgTag" aria-label="Telegram">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M21.5 3.8c-.2-.2-.5-.3-.8-.2l-17.9 6.9c-.4.2-.7.6-.7 1s.2.8.6 1l4.5 1.8 1.8 5c.2.4.5.7 1 .7h.1c.4 0 .8-.3 1-.7l2.4-3 3.9 3c.4.3.9.3 1.3.1.4-.2.6-.6.7-1L22 4.7c0-.4-.1-.7-.5-.9Z"></path>
          </svg>
          <span id="tgName" class="tg-name">@yapponecc1</span>
        </span>
        <span class="top-chip" id="topGift"><span class="top-chip-label">GIFT</span><span class="top-chip-value">—</span></span>
      </div>
      <div class="line-row">
        <p class="line" id="rotatingText" aria-live="polite">35 лет :D • Уже зашел? Мега хорош!</p>
      </div>
    </div>
  </section>

  <script>
    const tg = "@yapponecc1";
    const liveSocketConfig = {
      enabled: true,
      url: "ws://localhost:21213/",
      reconnectMs: 2500
    };
    const debugConsole = true;

    // real = как есть из события, alias = замена по словарю, translit = авто-транслит кириллицы
    const nicknameDisplayMode = "alias";
    const nicknameAliases = {
      "@yapponecc1": "@yapponecc1"
      // "оригинальный_ник": "КрасивыйНик"
    };

    const lines = [
      "35 лет :D • Уже зашел? Мега хорош!",
      "Сервер уже в Telegram"
    ];

    const minDelay = 4000;
    const maxDelay = 6000;
    const fadeMs = 520;

    const textEl = document.getElementById("rotatingText");
    const tgName = document.getElementById("tgName");
    const topStreakEl = document.getElementById("topStreak");
    const topGiftEl = document.getElementById("topGift");
    let idx = 0;
    let liveSocket = null;
    let reconnectTimer = null;
    const giftTotalsByUser = new Map();
    const streakBestByUser = new Map();

    function translitRuToLat(input) {
      const map = {
        а: "a", б: "b", в: "v", г: "g", д: "d", е: "e", ё: "yo", ж: "zh", з: "z", и: "i", й: "y",
        к: "k", л: "l", м: "m", н: "n", о: "o", п: "p", р: "r", с: "s", т: "t", у: "u", ф: "f",
        х: "kh", ц: "ts", ч: "ch", ш: "sh", щ: "sch", ъ: "", ы: "y", ь: "", э: "e", ю: "yu", я: "ya"
      };
      return input.split("").map((char) => {
        const lower = char.toLowerCase();
        if (!map[lower]) return char;
        const value = map[lower];
        return char === lower ? value : value.charAt(0).toUpperCase() + value.slice(1);
      }).join("");
    }

    function formatNick(nick) {
      if (nicknameDisplayMode === "alias") {
        return nicknameAliases[nick] || nick;
      }
      if (nicknameDisplayMode === "translit") {
        return translitRuToLat(nick);
      }
      return nick;
    }

    function toMinecraftNick(nick) {
      const prepared = translitRuToLat(formatNick(String(nick || "").trim().replace(/^@+/, "")));
      const cleaned = prepared
        .replace(/\s+/g, "_")
        .replace(/[^A-Za-z0-9_]/g, "")
        .slice(0, 16);
      return cleaned || "Player";
    }

    tgName.textContent = toMinecraftNick(tg);

    const urlParams = new URLSearchParams(window.location.search);
    const tops = {
      streakNick: urlParams.get("streakNick") || "",
      streakCount: Number(urlParams.get("streakCount") || 0),
      giftNick: urlParams.get("giftNick") || "",
      giftCoins: Number(urlParams.get("giftCoins") || 0)
    };

    function renderTops() {
      const streakNick = tops.streakNick ? toMinecraftNick(tops.streakNick) : "—";
      const giftNick = tops.giftNick ? toMinecraftNick(tops.giftNick) : "—";
      const streakValue = tops.streakCount > 0 ? " x" + tops.streakCount : "";
      const giftValue = tops.giftCoins > 0 ? " " + tops.giftCoins + "c" : "";
      topStreakEl.innerHTML = "<span class='top-chip-label'>STREAK</span><span class='top-chip-value'>" + streakNick + streakValue + "</span>";
      topGiftEl.innerHTML = "<span class='top-chip-label'>GIFT</span><span class='top-chip-value'>" + giftNick + giftValue + "</span>";
    }

    // Внешний хук: можно дергать из TikFinity/моста реальными никами
    window.updateAchievementTops = (payload = {}) => {
      if (typeof payload.streakNick === "string") tops.streakNick = payload.streakNick;
      if (typeof payload.streakCount === "number") tops.streakCount = payload.streakCount;
      if (typeof payload.giftNick === "string") tops.giftNick = payload.giftNick;
      if (typeof payload.giftCoins === "number") tops.giftCoins = payload.giftCoins;
      renderTops();
    };

    renderTops();

    function asNumber(value) {
      const num = Number(value);
      return Number.isFinite(num) ? num : 0;
    }

    function firstNonEmpty(...values) {
      for (const value of values) {
        if (value !== undefined && value !== null && value !== "") return value;
      }
      return "";
    }

    function getDeep(obj, path) {
      if (!obj || typeof obj !== "object") return undefined;
      const keys = path.split(".");
      let current = obj;
      for (const key of keys) {
        if (!current || typeof current !== "object") return undefined;
        current = current[key];
      }
      return current;
    }

    function tryParseJson(value) {
      if (typeof value !== "string") return null;
      const text = value.trim();
      if (!text || (!text.startsWith("{") && !text.startsWith("["))) return null;
      try {
        return JSON.parse(text);
      } catch {
        return null;
      }
    }

    function normalizeMessage(raw) {
      let msg = raw;
      if (typeof msg === "string") {
        const parsed = tryParseJson(msg);
        if (!parsed) return null;
        msg = parsed;
      }
      if (!msg || typeof msg !== "object") return null;

      if (typeof msg.data === "string") {
        const parsed = tryParseJson(msg.data);
        if (parsed) msg.data = parsed;
      }
      if (typeof msg.eventData === "string") {
        const parsed = tryParseJson(msg.eventData);
        if (parsed) msg.eventData = parsed;
      }
      if (msg.data && typeof msg.data === "object" && typeof msg.data.eventData === "string") {
        const parsed = tryParseJson(msg.data.eventData);
        if (parsed) msg.data.eventData = parsed;
      }
      return msg;
    }

    function detectEventType(msg, payload) {
      const rawType = firstNonEmpty(
        msg.eventName,
        msg.event,
        msg.type,
        msg.name,
        msg.action,
        msg.topic,
        getDeep(msg, "data.eventName"),
        getDeep(msg, "data.event"),
        getDeep(msg, "data.type"),
        getDeep(msg, "eventData.eventName"),
        getDeep(msg, "eventData.event"),
        getDeep(payload, "eventName"),
        getDeep(payload, "event"),
        getDeep(payload, "type")
      );
      const type = String(rawType || "").toLowerCase();

      if (type.includes("gift")) return "gift";
      if (type.includes("streak")) return "streak";

      const hasGiftShape = firstNonEmpty(
        getDeep(payload, "giftName"),
        getDeep(payload, "giftId"),
        getDeep(payload, "coins"),
        getDeep(payload, "diamondCount"),
        getDeep(payload, "repeatCount")
      );
      if (hasGiftShape !== "") return "gift";

      const hasStreakShape = firstNonEmpty(
        getDeep(payload, "streak"),
        getDeep(payload, "streakCount"),
        getDeep(payload, "comboCount")
      );
      if (hasStreakShape !== "") return "streak";

      return "";
    }

    function extractNick(payload) {
      const raw = firstNonEmpty(
        getDeep(payload, "nickname"),
        getDeep(payload, "nickName"),
        getDeep(payload, "displayName"),
        getDeep(payload, "username"),
        getDeep(payload, "userName"),
        getDeep(payload, "uniqueId"),
        getDeep(payload, "user.nickname"),
        getDeep(payload, "user.nickName"),
        getDeep(payload, "user.displayName"),
        getDeep(payload, "user.username"),
        getDeep(payload, "user.userName"),
        getDeep(payload, "user.uniqueId"),
        getDeep(payload, "fromUser.nickname"),
        getDeep(payload, "fromUser.uniqueId"),
        getDeep(payload, "trigger.nickname"),
        getDeep(payload, "trigger.username")
      );
      return String(raw || "").trim();
    }

    function extractGiftScore(payload) {
      const unitCoins = asNumber(firstNonEmpty(
        getDeep(payload, "coins"),
        getDeep(payload, "diamondCount"),
        getDeep(payload, "diamonds"),
        getDeep(payload, "giftCoins"),
        getDeep(payload, "gift.diamondCount"),
        getDeep(payload, "gift.diamond_count"),
        getDeep(payload, "giftData.value"),
        getDeep(payload, "value")
      ));
      const repeatCount = Math.max(1, asNumber(firstNonEmpty(
        getDeep(payload, "repeatCount"),
        getDeep(payload, "repeat_count"),
        getDeep(payload, "comboCount"),
        getDeep(payload, "combo"),
        getDeep(payload, "giftCount"),
        getDeep(payload, "count"),
        getDeep(payload, "amount")
      )) || 1);
      return unitCoins > 0 ? unitCoins * repeatCount : repeatCount;
    }

    function extractStreakValue(payload) {
      return Math.max(1, asNumber(firstNonEmpty(
        getDeep(payload, "streakCount"),
        getDeep(payload, "streak"),
        getDeep(payload, "repeatCount"),
        getDeep(payload, "repeat_count"),
        getDeep(payload, "comboCount"),
        getDeep(payload, "combo")
      )) || 1);
    }

    function getTopEntry(map) {
      let topNick = "";
      let topValue = 0;
      map.forEach((value, nick) => {
        if (value > topValue) {
          topValue = value;
          topNick = nick;
        }
      });
      return { nick: topNick, value: topValue };
    }

    function syncTopFromMaps() {
      const topGift = getTopEntry(giftTotalsByUser);
      const topStreak = getTopEntry(streakBestByUser);
      tops.giftNick = topGift.nick;
      tops.giftCoins = Math.round(topGift.value);
      tops.streakNick = topStreak.nick;
      tops.streakCount = Math.round(topStreak.value);
      renderTops();
    }

    function processEventMessage(rawMessage) {
      const msg = normalizeMessage(rawMessage);
      if (!msg) return;

      const payload = firstNonEmpty(
        msg.eventData,
        getDeep(msg, "data.eventData"),
        msg.data,
        msg.payload,
        msg.args,
        msg
      );
      if (!payload || typeof payload !== "object") return;

      const eventType = detectEventType(msg, payload);
      if (!eventType) return;

      const nick = extractNick(payload);
      if (!nick) return;

      if (eventType === "gift") {
        const score = extractGiftScore(payload);
        giftTotalsByUser.set(nick, (giftTotalsByUser.get(nick) || 0) + score);

        // В TikTok gifts repeatCount часто соответствует streak-комбо, используем как fallback.
        const streakFromGift = extractStreakValue(payload);
        streakBestByUser.set(nick, Math.max(streakBestByUser.get(nick) || 0, streakFromGift));

        if (debugConsole) {
          console.log("[ACHIEVEMENT] gift", { nick, score, payload });
        }
      }

      if (eventType === "streak") {
        const streak = extractStreakValue(payload);
        streakBestByUser.set(nick, Math.max(streakBestByUser.get(nick) || 0, streak));

        if (debugConsole) {
          console.log("[ACHIEVEMENT] streak", { nick, streak, payload });
        }
      }

      syncTopFromMaps();
    }

    function scheduleReconnect() {
      if (!liveSocketConfig.enabled) return;
      if (reconnectTimer) clearTimeout(reconnectTimer);
      reconnectTimer = setTimeout(connectLiveSocket, liveSocketConfig.reconnectMs);
    }

    function connectLiveSocket() {
      if (!liveSocketConfig.enabled || !("WebSocket" in window)) return;
      if (liveSocket && (liveSocket.readyState === WebSocket.OPEN || liveSocket.readyState === WebSocket.CONNECTING)) return;

      try {
        liveSocket = new WebSocket(liveSocketConfig.url);
        if (debugConsole) {
          console.log("[ACHIEVEMENT] connecting", liveSocketConfig.url);
        }
      } catch {
        scheduleReconnect();
        return;
      }

      liveSocket.onopen = () => {
        if (debugConsole) {
          console.log("[ACHIEVEMENT] connected");
        }
      };

      liveSocket.onmessage = (event) => {
        processEventMessage(event.data);
      };

      liveSocket.onclose = () => {
        if (debugConsole) {
          console.log("[ACHIEVEMENT] socket closed, reconnecting...");
        }
        scheduleReconnect();
      };

      liveSocket.onerror = () => {
        if (debugConsole) {
          console.log("[ACHIEVEMENT] socket error");
        }
        try {
          liveSocket.close();
        } catch {
          scheduleReconnect();
        }
      };
    }

    connectLiveSocket();

    // Проверка в браузерной консоли:
    // window.achievementDebug.test()
    // window.achievementDebug.push({...raw event...})
    // window.achievementDebug.state()
    window.achievementDebug = {
      state: () => ({
        tops: { ...tops },
        gifts: Object.fromEntries(giftTotalsByUser),
        streaks: Object.fromEntries(streakBestByUser)
      }),
      test: () => {
        window.updateAchievementTops({
          streakNick: "Mega_Player_1",
          streakCount: 7,
          giftNick: "TopDonator_99",
          giftCoins: 256
        });
      },
      push: (raw) => processEventMessage(raw)
    };

    function randomDelay() {
      return Math.floor(Math.random() * (maxDelay - minDelay + 1)) + minDelay;
    }

    function rotateText() {
      textEl.classList.add("is-hiding");

      setTimeout(() => {
        idx = (idx + 1) % lines.length;
        textEl.textContent = lines[idx];
        textEl.classList.remove("is-hiding");
        setTimeout(rotateText, randomDelay());
      }, fadeMs);
    }

    setTimeout(rotateText, 4600);
  </script>
</body>
</html>
