<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Telegram Achievement Widget</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Unbounded:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-1: #050d1f;
      --bg-2: #0f2a57;
      --bg-3: #132f6b;
      --card-1: rgba(8, 21, 46, 0.86);
      --card-2: rgba(15, 37, 73, 0.72);
      --line: rgba(147, 197, 253, 0.25);
      --text: #e4f3ff;
      --muted: #9eb3d1;
      --accent: #fb923c;
      --cyan: #22d3ee;
      --blue: #60a5fa;
      --mint: #34d399;
      --gold: #facc15;
      --shadow: 0 30px 80px rgba(2, 7, 20, 0.62);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      min-height: 100%;
    }

    body {
      margin: 0;
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: clamp(16px, 2vw, 28px);
      font-family: "Unbounded", "Segoe UI", sans-serif;
      color: var(--text);
      overflow: hidden;
      background:
        radial-gradient(70vw 70vw at 20% 10%, rgba(34, 211, 238, 0.22), transparent 60%),
        radial-gradient(60vw 60vw at 80% 90%, rgba(250, 204, 21, 0.14), transparent 64%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2) 50%, var(--bg-3));
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: -25vmax;
      pointer-events: none;
      mix-blend-mode: screen;
      opacity: 0.5;
    }

    body::before {
      background: conic-gradient(from 120deg, transparent 0%, rgba(96, 165, 250, 0.22), transparent 35%, rgba(34, 211, 238, 0.3), transparent 70%);
      animation: skyRotate 22s linear infinite;
    }

    body::after {
      background: radial-gradient(circle at 50% 50%, rgba(148, 163, 184, 0.15), transparent 45%);
      animation: pulseFog 6s ease-in-out infinite;
    }

    .stage {
      position: relative;
      width: min(760px, 100%);
    }

    .widget {
      position: relative;
      border-radius: 28px;
      overflow: hidden;
      border: 1px solid var(--line);
      padding: clamp(18px, 2.6vw, 30px);
      background: linear-gradient(160deg, var(--card-1), var(--card-2));
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      isolation: isolate;
      animation: widgetReveal 900ms cubic-bezier(.2, .82, .14, 1) both;
    }

    .widget::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(95deg, transparent 8%, rgba(148, 163, 184, 0.2) 46%, transparent 84%);
      transform: translateX(-140%);
      animation: scanLine 4.8s ease-in-out infinite;
      z-index: -1;
    }

    .achievement-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 13px;
      border-radius: 999px;
      font-size: 11px;
      letter-spacing: 1.1px;
      text-transform: uppercase;
      font-family: "Orbitron", sans-serif;
      color: #ffedd5;
      background: linear-gradient(90deg, rgba(251, 146, 60, 0.33), rgba(250, 204, 21, 0.25));
      border: 1px solid rgba(253, 186, 116, 0.45);
      animation: badgePulse 2.6s ease-in-out infinite;
    }

    .achievement-tag-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 12px rgba(250, 204, 21, 0.9);
    }

    .layout {
      margin-top: 14px;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: clamp(14px, 2.4vw, 24px);
      align-items: center;
    }

    .crest {
      width: clamp(70px, 8vw, 88px);
      aspect-ratio: 1;
      border-radius: 22px;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 34% 26%, rgba(255, 255, 255, 0.35), transparent 38%),
        linear-gradient(145deg, rgba(34, 211, 238, 0.62), rgba(96, 165, 250, 0.56));
      border: 1px solid rgba(186, 230, 253, 0.58);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.38),
        0 12px 24px rgba(56, 189, 248, 0.28);
      animation: crestHover 3.2s ease-in-out infinite;
    }

    .crest svg {
      width: 54%;
      fill: #ecfeff;
      filter: drop-shadow(0 2px 8px rgba(6, 182, 212, 0.46));
    }

    h1 {
      margin: 0;
      font-family: "Orbitron", sans-serif;
      font-size: clamp(24px, 4vw, 42px);
      line-height: 1.12;
      letter-spacing: 0.8px;
      text-wrap: balance;
    }

    .lead {
      margin: 10px 0 0;
      font-size: clamp(12px, 2vw, 15px);
      color: var(--muted);
      line-height: 1.58;
      max-width: 45ch;
    }

    .ticker-wrap {
      margin-top: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .ticker-label {
      font-family: "Orbitron", sans-serif;
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #bfdbfe;
      opacity: 0.86;
    }

    .ticker {
      font-size: 13px;
      color: #dbeafe;
      min-height: 1.25em;
      animation: tickerFade 500ms ease;
    }

    .footer {
      margin-top: 18px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
    }

    .server-hint {
      margin: 0;
      font-size: 13px;
      color: #cbd5e1;
      line-height: 1.5;
    }

    .server-hint strong {
      color: var(--mint);
      font-weight: 600;
    }

    .join-btn {
      appearance: none;
      border: 0;
      border-radius: 14px;
      padding: 12px 16px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.4px;
      font-family: "Unbounded", sans-serif;
      text-decoration: none;
      color: #f8fafc;
      background: linear-gradient(130deg, #0ea5e9, #2563eb);
      box-shadow:
        0 10px 24px rgba(14, 165, 233, 0.35),
        inset 0 1px 0 rgba(255, 255, 255, 0.36);
      transition: transform 220ms ease, box-shadow 220ms ease, filter 220ms ease;
    }

    .join-btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.07);
      box-shadow:
        0 16px 28px rgba(37, 99, 235, 0.42),
        inset 0 1px 0 rgba(255, 255, 255, 0.42);
    }

    .join-btn:active {
      transform: translateY(0);
    }

    .join-btn svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    .progress-wrap {
      margin-top: 18px;
      border: 1px solid rgba(96, 165, 250, 0.26);
      border-radius: 999px;
      padding: 4px;
      background: rgba(15, 23, 42, 0.42);
    }

    .progress-bar {
      --p: 0%;
      position: relative;
      width: var(--p);
      height: 11px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--cyan), var(--blue), #818cf8);
      box-shadow: 0 0 14px rgba(96, 165, 250, 0.5);
      transition: width 900ms cubic-bezier(.2, .8, .16, 1);
      overflow: hidden;
    }

    .progress-bar::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(105deg, transparent 15%, rgba(255, 255, 255, 0.7) 45%, transparent 72%);
      transform: translateX(-150%);
      animation: progressShine 2.6s linear infinite;
    }

    .progress-meta {
      margin-top: 8px;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-size: 11px;
      color: #bfdbfe;
      letter-spacing: 0.35px;
      text-transform: uppercase;
      font-family: "Orbitron", sans-serif;
    }

    .particles {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: -1;
    }

    .particles span {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(226, 232, 240, 0.45);
      filter: blur(0.2px);
      animation: floatBits linear infinite;
    }

    .particles span:nth-child(1) { left: 10%; top: 80%; animation-duration: 9s; animation-delay: -1s; }
    .particles span:nth-child(2) { left: 20%; top: 92%; animation-duration: 13s; animation-delay: -4s; width: 4px; height: 4px; }
    .particles span:nth-child(3) { left: 36%; top: 84%; animation-duration: 11s; animation-delay: -2.5s; }
    .particles span:nth-child(4) { left: 56%; top: 90%; animation-duration: 10s; animation-delay: -5s; width: 8px; height: 8px; }
    .particles span:nth-child(5) { left: 76%; top: 86%; animation-duration: 8.8s; animation-delay: -3.2s; }
    .particles span:nth-child(6) { left: 88%; top: 95%; animation-duration: 12s; animation-delay: -1.8s; width: 5px; height: 5px; }

    @keyframes widgetReveal {
      from { opacity: 0; transform: translateY(24px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes skyRotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes pulseFog {
      0%, 100% { opacity: 0.36; }
      50% { opacity: 0.56; }
    }

    @keyframes crestHover {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }

    @keyframes badgePulse {
      0%, 100% { box-shadow: 0 0 0 rgba(251, 146, 60, 0); }
      50% { box-shadow: 0 0 22px rgba(251, 146, 60, 0.3); }
    }

    @keyframes scanLine {
      0%, 18% { transform: translateX(-140%); }
      40%, 100% { transform: translateX(140%); }
    }

    @keyframes tickerFade {
      from { opacity: 0.2; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes progressShine {
      to { transform: translateX(150%); }
    }

    @keyframes floatBits {
      from {
        transform: translate3d(0, 0, 0) scale(0.8);
        opacity: 0;
      }
      25% {
        opacity: 1;
      }
      to {
        transform: translate3d(0, -96px, 0) scale(1.2);
        opacity: 0;
      }
    }

    @media (max-width: 640px) {
      .layout {
        grid-template-columns: 1fr;
        text-align: center;
      }

      .crest {
        margin-inline: auto;
      }

      .lead {
        margin-inline: auto;
      }

      .ticker-wrap {
        justify-content: center;
      }

      .footer {
        grid-template-columns: 1fr;
        justify-items: center;
      }

      .server-hint {
        text-align: center;
      }

      .progress-meta {
        font-size: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="stage">
    <section class="widget" aria-label="Telegram achievement widget">
      <div class="achievement-tag">
        <span class="achievement-tag-dot" aria-hidden="true"></span>
        Achievement Unlocked
      </div>

      <div class="layout">
        <div class="crest" aria-hidden="true">
          <svg viewBox="0 0 24 24" role="img" aria-label="Telegram icon">
            <path d="M9.8 15.6 9.4 21c.6 0 .8-.3 1.2-.6l2.8-2.6 5.8 4.2c1.1.6 1.9.3 2.2-1l3.9-18.1h.1c.4-1.8-.7-2.5-1.8-2.1L1.8 8.7c-1.7.7-1.7 1.6-.3 2l5.6 1.8L20 4.4c.6-.4 1.2-.1.8.2"></path>
          </svg>
        </div>

        <div>
          <h1 id="tgTitle">Название вашего TG</h1>
          <p class="lead">
            Подпишись и забери доступ к движу. Новый уровень комьюнити открыт, а сервер уже ждёт тебя внутри.
          </p>

          <div class="ticker-wrap">
            <span class="ticker-label">Сейчас:</span>
            <span class="ticker" id="tickerText">Эпичный апгрейд сообщества</span>
          </div>
        </div>
      </div>

      <div class="footer">
        <p class="server-hint" id="serverHint"><strong>Сервер найдёте тут:</strong> @your_tg</p>
        <a class="join-btn" id="joinBtn" href="https://t.me/your_tg" target="_blank" rel="noopener noreferrer">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M9.8 15.6 9.4 21c.6 0 .8-.3 1.2-.6l2.8-2.6 5.8 4.2c1.1.6 1.9.3 2.2-1l3.9-18.1h.1c.4-1.8-.7-2.5-1.8-2.1L1.8 8.7c-1.7.7-1.7 1.6-.3 2l5.6 1.8L20 4.4c.6-.4 1.2-.1.8.2"></path>
          </svg>
          Войти в Telegram
        </a>
      </div>

      <div class="progress-wrap" aria-hidden="true">
        <div class="progress-bar" id="progressBar"></div>
      </div>

      <div class="progress-meta">
        <span>Комьюнити буст</span>
        <span id="progressValue">0%</span>
      </div>
    </section>

    <div class="particles" aria-hidden="true">
      <span></span><span></span><span></span><span></span><span></span><span></span>
    </div>
  </div>

  <script>
    const widgetData = {
      title: "Мой TG: Название канала",
      handle: "@your_tg",
      telegramUrl: "https://t.me/your_tg",
      serverLabel: "Сервер найдёте тут:",
      progressTarget: 92
    };

    const tickerLines = [
      "Эпичный апгрейд сообщества",
      "Новый сезон активностей открыт",
      "Сервер и чат уже онлайн",
      "Заходи и получай роль участника"
    ];

    const tgTitle = document.getElementById("tgTitle");
    const serverHint = document.getElementById("serverHint");
    const joinBtn = document.getElementById("joinBtn");
    const tickerText = document.getElementById("tickerText");
    const progressBar = document.getElementById("progressBar");
    const progressValue = document.getElementById("progressValue");

    tgTitle.textContent = widgetData.title;
    serverHint.innerHTML = "<strong>" + widgetData.serverLabel + "</strong> " + widgetData.handle;
    joinBtn.href = widgetData.telegramUrl;

    let idx = 0;
    setInterval(() => {
      idx = (idx + 1) % tickerLines.length;
      tickerText.style.animation = "none";
      void tickerText.offsetWidth;
      tickerText.style.animation = "tickerFade 500ms ease";
      tickerText.textContent = tickerLines[idx];
    }, 2400);

    let val = 0;
    const progressTimer = setInterval(() => {
      val += 2;
      if (val >= widgetData.progressTarget) {
        val = widgetData.progressTarget;
        clearInterval(progressTimer);
      }
      progressBar.style.setProperty("--p", val + "%");
      progressValue.textContent = val + "%";
    }, 32);
  </script>
</body>
</html>
